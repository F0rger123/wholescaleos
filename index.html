<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WholeScale OS</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root">
      <!-- Static Branded Loader for Seamless Initial Load -->
      <div style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #060e20; color: #dee5ff; font-family: sans-serif; z-index: 9999;">
        <div style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3); margin-bottom: 30px;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 18h12"/><path d="M10 22v-4"/><path d="M14 22v-4"/></svg>
        </div>
        <div style="text-align: center;">
          <h2 style="font-size: 24px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; margin: 0 0 8px 0;">WholeScale <span style="color: #9fa7ff;">OS</span></h2>
          <div style="color: rgba(159, 167, 255, 0.6); font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <div style="width: 12px; height: 12px; border: 2px solid rgba(159, 167, 255, 0.3); border-top-color: #9fa7ff; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            Initializing Foundation
          </div>
        </div>
        <div style="width: 192px; height: 4px; background: rgba(255, 255, 255, 0.05); border-radius: 999px; margin-top: 40px; overflow: hidden;">
          <div style="height: 100%; background: linear-gradient(to right, #6366f1, #a855f7); width: 30%; animation: shimmer 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></div>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
      </style>
    </div>
    <div id="portal-root"></div> <!-- Add this line -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
