<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WholeScale OS</title>
    <style>
      /* Emergency styles */
      body { 
        margin: 0; 
        padding: 0; 
        background: #0f172a; 
        color: white; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #root { 
        min-height: 100vh; 
      }
      /* Range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        background: #334155;
        border-radius: 3px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        background: #3b82f6;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid white;
      }
      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        background: #3b82f6;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- THIS IS THE IMPORTANT LINE - tells Vite to load your React app -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
