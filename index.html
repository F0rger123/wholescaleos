<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WholeScale OS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23a855f7;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='25' fill='url(%23grad)' /%3E%3Cpath d='M30 70 L30 45 L50 30 L70 45 L70 70 Z' fill='white' /%3E%3Cpath d='M45 70 L45 55 L55 55 L55 70 Z' fill='%236366f1' /%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23a855f7;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='25' fill='url(%23grad)' /%3E%3Cpath d='M30 70 L30 45 L50 30 L70 45 L70 70 Z' fill='white' /%3E%3Cpath d='M45 70 L45 55 L55 55 L55 70 Z' fill='%236366f1' /%3E%3C/svg%3E" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root">
      <!-- Static Branded Loader for Seamless Initial Load -->
      <div id="initial-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000000; color: #ffffff; font-family: sans-serif; z-index: 99999;">
        <div style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 50px rgba(99, 102, 241, 0.4); margin-bottom: 30px;">
          <svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 70 L30 45 L50 30 L70 45 L70 70 Z" fill="white" />
            <path d="M45 70 L45 55 L55 55 L55 70 Z" fill="#6366f1" />
          </svg>
        </div>
        <div style="text-align: center;">
          <h2 style="font-size: 24px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; margin: 0 0 8px 0;">WholeScale <span style="color: #6366f1;">OS</span></h2>
          <div style="color: rgba(255, 255, 255, 0.4); font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <div style="width: 12px; height: 12px; border: 2px solid rgba(255, 255, 255, 0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            Initializing Foundation
          </div>
        </div>
        <div style="width: 192px; height: 4px; background: rgba(255, 255, 255, 0.05); border-radius: 999px; margin-top: 40px; overflow: hidden;">
          <div style="height: 100%; background: linear-gradient(to right, #6366f1, #a855f7); width: 0%; animation: initial-loading 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;"></div>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes initial-loading { from { width: 0%; } to { width: 100%; } }
      </style>
    </div>
    <div id="portal-root"></div> <!-- Add this line -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
